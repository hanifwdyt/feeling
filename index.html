<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#faf6f1" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#242030" media="(prefers-color-scheme: dark)" />
    <title>feeling — cerita aja, aku dengerin</title>
    <meta
      name="description"
      content="Tempat buat ngeloso dan cerita — terus pelan-pelan ngerti apa yang sebenernya kamu rasain. Datanya cuma di HP kamu."
    />

    <!-- ONE font origin, and only the three instances actually used (500, 600,
         italic 400). The previous build pulled Fraunces' whole variable range
         (opsz 9..144 + wght 400..700 + italic) plus Satoshi from a second origin
         — 220 KB of font across two DNS lookups and two TLS handshakes, all of it
         render-blocking. That was 4 seconds of blank screen.

         Body text is now the system stack: SF Pro on iOS, Roboto on Android. It
         costs nothing, renders instantly, and for an app that wants to feel soft
         and native it honestly reads better than a downloaded geometric sans. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;1,400&display=swap"
    />
    <!-- non-blocking: the page paints in the fallback face, then swaps. -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;1,400&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;1,400&display=swap"
      />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
