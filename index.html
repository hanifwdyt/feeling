<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#faf6f1" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#242030" media="(prefers-color-scheme: dark)" />
    <title>feeling — cerita aja, aku dengerin</title>
    <meta
      name="description"
      content="Tempat buat ngeloso dan cerita — terus pelan-pelan ngerti apa yang sebenernya kamu rasain. Datanya cuma di HP kamu."
    />

    <!-- ONE font origin, and only the three instances actually used (500, 600,
         italic 400). The previous build pulled Fraunces' whole variable range
         (opsz 9..144 + wght 400..700 + italic) plus Satoshi from a second origin
         — 220 KB of font across two DNS lookups and two TLS handshakes, all of it
         render-blocking. That was 4 seconds of blank screen.

         Body text is now the system stack: SF Pro on iOS, Roboto on Android. It
         costs nothing, renders instantly, and for an app that wants to feel soft
         and native it honestly reads better than a downloaded geometric sans. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;1,400&display=swap"
    />
    <!-- non-blocking: the page paints in the fallback face, then swaps. -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;1,400&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;1,400&display=swap"
      />
    </noscript>
  </head>
  <body>
    <!-- Painted from HTML + inline CSS, before a single byte of JS runs.
         This is a SPA with no SSR, so nothing at all appeared until React had
         downloaded, parsed and mounted — that was the blank screen. The couch is
         pure CSS, so we can just draw it here and let React take over the moment
         it's ready. FCP stops being a JavaScript problem. -->
    <style>
      :root {
        --sk-room: #faf6f1;
        --sk-cushion: #fdfbf8;
        --sk-calm: #c9bde4;
        --sk-calm-lit: #dbd2ee;
        --sk-calm-dim: #b0a0d4;
        --sk-calm-base: #8f7bc0;
        --sk-ink: #4b4238;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --sk-room: #242030;
          --sk-cushion: #302b3e;
          --sk-calm: #8f7bb8;
          --sk-calm-lit: #a08fc7;
          --sk-calm-dim: #6f5d9b;
          --sk-calm-base: #574780;
          --sk-ink: #efeae4;
        }
      }
      html { background: var(--sk-room); }
      .boot {
        max-width: 720px;
        margin: 0 auto;
        padding: 34px 20px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      .boot-logo {
        font-family: Georgia, "Times New Roman", serif;
        font-size: 24px;
        font-weight: 600;
        letter-spacing: -0.02em;
        color: var(--sk-ink);
        margin-bottom: 46px;
      }
      .boot-couch {
        height: 268px;
        border-radius: 44px;
        background: linear-gradient(168deg, var(--sk-calm-lit), var(--sk-calm) 58%, var(--sk-calm-dim));
        box-shadow:
          inset 0 3px 0 rgba(255, 255, 255, 0.6),
          0 10px 0 -2px var(--sk-calm-base),
          0 26px 50px -14px rgba(143, 123, 192, 0.5);
        animation: boot-breathe 2.4s ease-in-out infinite;
      }
      @keyframes boot-breathe {
        0%, 100% { opacity: 0.82; }
        50%      { opacity: 1; }
      }
      @media (prefers-reduced-motion: reduce) {
        .boot-couch { animation: none; }
      }
    </style>

    <div id="root">
      <div class="boot" aria-hidden="true">
        <div class="boot-logo">feeling</div>
        <div class="boot-couch"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
